name: Windows CUDA build

# Builds llama-server (with CUDA + vision/mtmd) for Blackwell (sm_120, e.g. RTX 5080)
# and uploads it as a downloadable artifact. Personal fork — Windows/CUDA only.
# Runs on pushes to main (ignoring docs/launcher) and on manual dispatch.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
      - '*.ps1'
  workflow_dispatch:
    inputs:
      cuda_version:
        description: 'CUDA toolkit version'
        default: '13.1'
        required: false

env:
  CUDA_VERSION: ${{ github.event.inputs.cuda_version || '13.1' }}

jobs:
  windows-cuda:
    runs-on: windows-2022
    permissions:
      contents: write   # needed to create/update the GitHub Release
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: windows-cuda-server
          variant: ccache
          evict-old-files: 7d

      - name: Install CUDA Toolkit
        uses: ./.github/actions/windows-setup-cuda
        with:
          cuda_version: ${{ env.CUDA_VERSION }}

      - name: Install Ninja
        run: choco install ninja

      - name: Build full tool suite (CUDA, sm_120)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cmake -S . -B build -G "Ninja Multi-Config" ^
            -DGGML_CUDA=ON ^
            -DCMAKE_CUDA_ARCHITECTURES=120 ^
            -DGGML_CUDA_CUB_3DOT2=ON ^
            -DLLAMA_CURL=OFF ^
            -DLLAMA_BUILD_BORINGSSL=ON ^
            -DLLAMA_BUILD_TESTS=OFF ^
            -DLLAMA_BUILD_EXAMPLES=OFF
          set /A NINJA_JOBS=%NUMBER_OF_PROCESSORS%-1
          rem No --target: build the full tool suite (llama-server, llama-cli, llama-quantize,
          rem llama-mtmd-cli, llama-bench, llama-perplexity, llama-gguf-split, etc.) so the
          rem release is a complete, usable package rather than just the server.
          cmake --build build --config Release -j %NINJA_JOBS%

      - name: Package
        shell: pwsh
        run: |
          $rel = ".\build\bin\Release"

          # Bundle the CUDA runtime DLLs so the package runs with only the NVIDIA driver
          # installed (no CUDA toolkit needed). Search the installed toolkit recursively —
          # CUDA_PATH is set by the windows-setup-cuda action; fall back to the versioned dir.
          $cudaRoot = $env:CUDA_PATH
          if (-not $cudaRoot) { $cudaRoot = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v$($env:CUDA_VERSION)" }
          Write-Host "CUDA root: $cudaRoot"
          $needed = @('cudart64_*.dll','cublas64_*.dll','cublasLt64_*.dll')
          $found = Get-ChildItem -Path $cudaRoot -Recurse -File -Include $needed -ErrorAction SilentlyContinue
          if (-not $found) {
            Write-Host "::warning::no CUDA DLLs under $cudaRoot — searching all of the CUDA install dir"
            $found = Get-ChildItem -Path "C:\Program Files\NVIDIA GPU Computing Toolkit" -Recurse -File -Include $needed -ErrorAction SilentlyContinue
          }
          Write-Host "CUDA DLLs found:"
          $found | ForEach-Object { Write-Host "  $($_.FullName)"; Copy-Item $_.FullName -Destination $rel -Force }

          # Fail loudly rather than publish an incomplete package.
          foreach ($p in @('cudart64_*.dll','cublas64_*.dll','cublasLt64_*.dll')) {
            if (-not (Get-ChildItem "$rel\$p" -ErrorAction SilentlyContinue)) {
              Write-Host "::error::required CUDA DLL '$p' was not bundled — package would be incomplete"
              exit 1
            }
          }

          Write-Host "Release dir contents:"
          Get-ChildItem $rel | ForEach-Object { Write-Host "  $($_.Name)" }

          $out = "llama-win-cuda$($env:CUDA_VERSION)-sm120-x64.zip"
          7z a -snl $out "$rel\*.exe" "$rel\*.dll"
          echo "ARTIFACT=$out" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: llama-win-cuda-sm120
          path: ${{ env.ARTIFACT }}
          retention-days: 14

      - name: Publish to "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Windows CUDA build (sm_120)
          prerelease: true
          # replace the asset of the same name on each build so "latest" always
          # holds the newest binary
          files: ${{ env.ARTIFACT }}
          body: |
            Automated **full tool suite** Windows x64 build — CUDA, Blackwell `sm_120` (RTX 50-series).
            Includes `llama-server`, `llama-cli`, `llama-quantize`, `llama-mtmd-cli`, `llama-bench`,
            `llama-perplexity`, `llama-gguf-split`, etc., vision (`--mmproj`) support, and the bundled
            CUDA runtime DLLs (runs with just the NVIDIA driver).

            - Commit: `${{ github.sha }}`
            - CUDA toolkit: `${{ env.CUDA_VERSION }}`
            - Built on `windows-2022` (MSVC 2022)

            Unzip and run any tool (e.g. `llama-server.exe`), or point `run-gemma.ps1` at the folder.
